meta:
  id: "pong_1"
  title: "singleplayer_pong"
  version: "1.0.0"
  
globals:
  score: 3 #3 pont szükséges a nyeréshez
  
layout:
  map_size: [20, 20] # 20x20-as rács
  background_color: [0,0,0] # Fekete háttér RGB-ben
  
entities:
  # --- JÁTÉKOS ÉS LABDA ---
  - name: "ball"
    type: "dynamic"
    velocity: [10, 10] # X és Y irányú kezdősebesség is kell a mozgáshoz
    grid_pos: [10, 10] # Középről indul
    size: [0.5, 0.5]       # 1x1 grid méretű
    shape: "circle"
    model: ""
    
  - name: "paddle"
    type: "kinematic"
    grid_pos: [0, 8]   # Bal szélen (X=0), középtájt indul
    size: [1, 4]       # 1 grid széles, 4 grid magas (ez az ütő formája)
    shape: "rect"
    model: ""
    constraints: ["y"] # Csak függőlegesen mozoghat

  # --- PÁLYA HATÁRAI (FALAK) ---
  - name: "wall_top"
    group: "walls_x"   # X tengelyen pattintó falak csoportja
    type: "static"
    grid_pos: [0, 0]
    size: [20, 1]      # Teljes szélességű (20), 1 rács magas
    shape: "rect"

  - name: "wall_bottom"
    group: "walls_x"
    type: "static"
    grid_pos: [0, 19]  # A rács alján van
    size: [20, 1]
    shape: "rect"

  - name: "wall_right"
    group: "walls_y"   # Y tengelyen pattintó falak csoportja
    type: "static"
    grid_pos: [19, 0]  # Jobb szélen
    size: [1, 20]      # 1 rács széles, végigérő magasságú (20)
    shape: "rect"
    
inputs:
  - name: "player_1"
    source: "laser_red"
    target: "paddle"
  
rules:
  # Pattanás az ütőről és a jobb falról (X irányú fordulás)
  - condition:
      collision: "between [ball, paddle]"
    action:
      - "bounce_x"
      
  - condition:
      collision: "between [ball, walls_x]"
    action:
      - "bounce_y"

  # Pattanás a padlóról és a plafonról (X irányú fordulás)
  - condition:
      collision: "between [ball, walls_y]"
    action:
      - "bounce_x"
      - "score_add(player_1, 1)" # Pontot kap, ha elérte a falat

  # Életvesztés (Ha a labda X pozíciója kisebb mint 0, vagyis kiment balra)
  - condition:
      position:
        target: "ball"
        operator: "<"
        value: 0
    action:
      - "damage(player_1)"
      - "respawn(ball, [10, 10])" # 10, 10 pozícióra
      - "set_velocity(ball, [10, 10])" # X és Y irányú kezdősebesség is kell a mozgáshoz