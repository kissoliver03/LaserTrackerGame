meta:
  title: "snake_like"
  version: "1.0.0"

globals:
  lives: 1
  score: 1

layout:
  map_size: [32, 18]
  background_color: [0, 0, 0]

entities:
  - name: "ball"
    type: "kinematic"
    grid_pos: [0, 9]
    size: [0.75, 0.75]
    shape: "circle"
    model: "assets/models/ball.png"
    tile: true

  - name: "wall"
    group: "walls"
    type: "static"
    grid_pos: [2, 0]
    size: [1, 8]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  - name: "wall"
    group: "walls"
    type: "static"
    grid_pos: [2, 8]
    size: [5, 1]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  - name: "wall"
    group: "walls"
    type: "static"
    grid_pos: [7, 8]
    size: [1, 4]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  - name: "wall"
    group: "walls"
    type: "static"
    grid_pos: [0, 10]
    size: [6, 1]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  - name: "wall_outer_corner_1"
    group: "walls"
    type: "static"
    grid_pos: [ 5, 11 ]
    size: [ 1, 3 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  - name: "wall_bottom_path_1"
    group: "walls"
    type: "static"
    grid_pos: [ 5, 13 ]
    size: [ 9, 1 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  - name: "wall_top_path_1"
    group: "walls"
    type: "static"
    grid_pos: [ 8, 11 ]
    size: [ 4, 1 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  # --- 2. Kanyar felfelé ---
  - name: "wall_left_path_up_1"
    group: "walls"
    type: "static"
    grid_pos: [ 11, 4 ]
    size: [ 1, 8 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  - name: "wall_right_path_up_1"
    group: "walls"
    type: "static"
    grid_pos: [ 13, 5 ]
    size: [ 1, 9 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  # --- 3. Kanyar jobbra ---
  - name: "wall_top_path_2"
    group: "walls"
    type: "static"
    grid_pos: [ 11, 3 ]
    size: [ 9, 1 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  - name: "wall_bottom_path_2"
    group: "walls"
    type: "static"
    grid_pos: [ 14, 5 ]
