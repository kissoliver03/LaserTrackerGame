    model: "assets/models/wall.png"
    tile: true

  # --- 4. Kanyar lefelé ---
  - name: "wall_left_path_down_2"
    group: "walls"
    type: "static"
    grid_pos: [ 17, 6 ]
    size: [ 1, 10 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  - name: "wall_right_path_down_2"
    group: "walls"
    type: "static"
    grid_pos: [ 19, 4 ]
    size: [ 1, 10 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  # --- 5. Kanyar jobbra ---
  - name: "wall_top_path_3"
    group: "walls"
    type: "static"
    grid_pos: [ 20, 13 ]
    size: [ 4, 1 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  - name: "wall_bottom_path_3"
    group: "walls"
    type: "static"
    grid_pos: [ 18, 15 ]
    size: [ 8, 1 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  # --- 6. Kanyar felfelé ---
  - name: "wall_left_path_up_2"
    group: "walls"
    type: "static"
    grid_pos: [ 23, 6 ]
    size: [ 1, 7 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  - name: "wall_right_path_up_2"
    group: "walls"
    type: "static"
    grid_pos: [ 25, 8 ]
    size: [ 1, 8 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  # --- 7. Utolsó kanyar jobbra (Kijárat) ---
  - name: "wall_top_exit"
    group: "walls"
    type: "static"
    grid_pos: [ 24, 6 ]
    size: [ 8, 1 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  - name: "wall_bottom_exit"
    group: "walls"
    type: "static"
    grid_pos: [ 26, 8 ]
    size: [ 6, 1 ]
    shape: "rect"
    model: "assets/models/wall.png"
    tile: true

  - name: "coin"
    type: "static"
    grid_pos: [31, 7]
    shape: "circle"
    model: "assets/models/coin.png"


inputs:
  - name: "player1"
    source: "laser_red"
    target: "ball"

rules:
  - condition:
      type: "collision"
      targets: [ "ball", "walls" ]
    action:
      - type: "damage"
        targets: [ "player1" ]
        value: 1

  - condition:
      type: "collision"
      targets: ["ball", "coin"]
    action:
      - type: "add_score"
        targets: ["player1"]
        value: 1