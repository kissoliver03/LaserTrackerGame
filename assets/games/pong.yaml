meta:
  id: "pong_1"
  title: "singleplayer_pong"
  version: "1.0.0"

globals:
  score: 3 # 3 points to win

layout:
  map_size: [20, 20] # 20x20 grid
  background_color: [0,0,0]

entities:
  - name: "ball"
    type: "dynamic"
    velocity: [2, 2] # X and Y start speed
    grid_pos: [10, 10]
    size: [1, 1]
    shape: "circle"
    model: ""

  - name: "paddle"
    type: "kinematic"
    grid_pos: [0, 8]
    size: [1, 4]       # 1 grid horizontally and 4 grid vertically
    shape: "rect"
    model: ""
    constraints: ["y"] # Only moves vertically

  - name: "wall_top"
    group: "walls_x"   # Horizontal walls group
    type: "static"
    grid_pos: [0, 0]
    size: [20, 1]      # 1 width full screen-width
    shape: "rect"

  - name: "wall_bottom"
    group: "walls_x"
    type: "static"
    grid_pos: [0, 19]  # Down
    size: [20, 1]
    shape: "rect"

  - name: "wall_right"
    group: "walls_y"   # Vertical walls group
    type: "static"
    grid_pos: [19, 0]  # Right side
    size: [1, 20]      # 1 width top to bottom
    shape: "rect"

inputs:
  - name: "player_1"
    source: "laser_red"
    target: "paddle"

rules:
  # X bounce from paddle
  - condition:
      type: "collision"
      targets: ["ball", "paddle"]
    action:
      - type: "bounce"
        axis: "x"

  # X bounce from horizontal walls
  - condition:
      type: "collision"
      targets: ["ball", "walls_x"]
    action:
      - type: "bounce"
        axis: "y"

  # Y bounce form vertical walls
  - condition:
      type: "collision"
      targets: ["ball", "walls_y"]
    action:
      - type: "bounce"
        axis: "x"
      - type: "score"
        targets: ["player_1"]
        amount: 1

  # -1 HP when the ball goes out of bound and respawn to [10, 10]
  - condition:
      type: "position"
      targets: ["ball"]
      axis: "x"
      operator: "<"
      value: 0
    action:
      - type: "damage"
        targets: ["player_1"]
      - type: "respawn"
        target: "ball"
        pos: [10, 10]